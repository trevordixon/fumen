name: CI

on:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Strict checks
        run: npm run ci:strict

      - name: API smoke test
        run: npm run test:api-smoke
